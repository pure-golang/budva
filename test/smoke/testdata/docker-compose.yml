services:
  facade:
    build:
      context: ../../..
      dockerfile: Dockerfile
    entrypoint: ["/app/facade"]
    env_file: ../../../.env
    ports:
      - "7070"
    restart: "no"

  engine:
    build:
      context: ../../..
      dockerfile: Dockerfile
    entrypoint: ["/app/engine"]
    env_file: ../../../.env
    restart: "no"
