      all: true
  github.com/pure-golang/budva-claude/internal/service/transform:
    config:
      all: true
  github.com/pure-golang/budva-claude/internal/controller:
    config:
      all: true
  github.com/pure-golang/budva-claude/internal/service/facade:
    config:
      all: true
  github.com/pure-golang/budva-claude/internal/service/auth:
    config:
      all: true
  github.com/pure-golang/budva-claude/internal/transport/http:
    config:
      all: true
  github.com/pure-golang/budva-claude/internal/transport/grpc:
    config:
      all: true
  github.com/pure-golang/budva-claude/internal/transport/http/graph:
    config:
      all: true
